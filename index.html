<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Crash Bet</title>
<meta name="description" content="Crash Bet — a deterministic low-poly crash sandbox. 92 seeded vehicles, 51 scenery models, spline roads and generated worlds.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%23ff7a3d' d='M4 20l3-7 4-3h10l4 3 3 7v5h-4a3 3 0 0 1-6 0h-4a3 3 0 0 1-6 0H4z'/></svg>">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#25272c">
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": { "three": "./libs/three.module.js" } }
</script>
</head>
<body>
<div id="stage" aria-label="3D viewport"></div>

<!-- ============ main menu ============ -->
<div id="menu">
  <div class="menucard">
    <svg class="menulogo" viewBox="0 0 48 32" aria-hidden="true">
      <path fill="url(#lg)" d="M4 22l4-9 7-4h14l7 4 8 9v5h-5a4 4 0 0 1-8 0H19a4 4 0 0 1-8 0H4z"/>
      <path fill="#181a1e" opacity=".55" d="M16 11h6v6h-9zM24 11h6l3 6h-9z"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff6a3d"/><stop offset="1" stop-color="#ffb03a"/>
      </linearGradient></defs>
    </svg>
    <h1 class="menutitle">CRASH <span>BET</span></h1>
    <p class="menutag" id="menutag">deterministic low-poly sandbox</p>
    <button id="startBtn" class="mbtn primary big" disabled>▶&nbsp; Start Game</button>
    <button id="sceneBtn" class="mbtn big" disabled>🎬&nbsp; Play a Scene</button>
    <button id="crashBtn" class="mbtn big" disabled>💥&nbsp; Crash Test</button>
    <div id="boot">
      <div id="bootbar"><i id="bootfill"></i></div>
      <p id="bootmsg">warming up…</p>
    </div>
    <p class="menufoot">drag to orbit · pinch / scroll to zoom</p>
  </div>
</div>

<!-- ============ round loading beat (pre-sim) ============ -->
<div id="loading" hidden>
  <div class="loadcard">
    <p class="loadlabel" id="loadlabel">syncing dashcams…</p>
    <div id="loadbar"><i id="loadfill"></i></div>
    <p class="loadsub" id="loadsub"></p>
  </div>
</div>

<!-- ============ in-game HUD ============ -->
<div id="hud" hidden>
  <button id="hamb" class="hambtn" aria-label="Open menu" title="Menu">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5h16M4 12h16M4 17.5h16" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
  </button>
  <button id="camBtn" class="hambtn cambtn" aria-label="Toggle freecam" title="Freecam (C)">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 8.5h9A1.5 1.5 0 0 1 14 10v5.5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 15.5V10a1.5 1.5 0 0 1 1.5-1.5zM14 11.5l6-3v9l-6-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
  </button>
  <!-- round HUD (scene mode): countdown ring + incident banner -->
  <div id="roundui" hidden>
    <div id="ring">
      <svg viewBox="0 0 44 44" aria-hidden="true">
        <circle class="rbg" cx="22" cy="22" r="19"/>
        <circle class="rfg" id="rfg" cx="22" cy="22" r="19"/>
      </svg>
      <span id="ringT">10</span>
    </div>
    <div id="scenetag"><b id="sceneLv">LV 1</b><span id="sceneTopo">—</span></div>
    <div id="freeze" hidden>
      <p class="fzlabel">INCIDENT</p>
      <button id="fzGo" class="mbtn primary">▶&nbsp; Resume</button>
      <p class="fzhint">space / tap</p>
    </div>
    <div id="outcome" hidden></div>
  </div>
  <!-- crash-test controls (visible only in crash mode) -->
  <div id="crashui" hidden>
    <button id="cReplay" class="hambtn crashbtn" aria-label="Replay crash" title="Replay (R)">⟳</button>
    <button id="cNext" class="hambtn crashbtn" aria-label="Next crash scene" title="Next scene (N)">⏭</button>
    <button id="cSlow" class="hambtn crashbtn" aria-label="Toggle slow motion" title="Slow-mo (T)">🐢</button>
    <button id="cMute" class="hambtn crashbtn" aria-label="Toggle sound" title="Sound">🔊</button>
    <div id="dmgHud" aria-live="off">💥 0</div>
  </div>
</div>

<!-- ============ freecam touch controls ============ -->
<div id="flyui" aria-hidden="true">
  <div id="joy"><div id="joynub"></div></div>
  <div class="flybtns">
    <button id="flyUp" aria-label="Ascend">▲</button>
    <button id="flyDown" aria-label="Descend">▼</button>
  </div>
</div>

<!-- ============ pause menu ============ -->
<div id="pause" hidden>
  <div class="pausecard" role="dialog" aria-label="Pause menu">
    <div id="pauseMain">
      <h2>Paused</h2>
      <button id="p_resume" class="mbtn primary">Resume</button>
      <button id="p_settings" class="mbtn">Settings</button>
      <button id="p_fs" class="mbtn">Fullscreen</button>
      <button id="p_leave" class="mbtn danger">Leave</button>
    </div>
    <div id="pauseSettings" hidden>
      <h2>Settings</h2>
      <p class="msub">Environment</p>
      <div class="mchips" id="set_envs" role="group" aria-label="Environment"></div>
      <p class="msub">Quality</p>
      <div class="mchips" id="set_quality" role="group" aria-label="Quality">
        <button data-q="low" class="mchip">Low</button>
        <button data-q="high" class="mchip">High</button>
      </div>
      <p class="msub">Camera</p>
      <div class="mchips" id="set_cam" role="group" aria-label="Camera mode">
        <button data-cam="orbit" class="mchip sel">Orbit</button>
        <button data-cam="fly" class="mchip">Freecam</button>
      </div>
      <button id="p_back" class="mbtn">← Back</button>
    </div>
  </div>
</div>

<!-- ============ rotate hint (portrait phones, in game) ============ -->
<div id="rotate" aria-hidden="true">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3.5h7A1.5 1.5 0 0 1 15.5 5v14A1.5 1.5 0 0 1 14 20.5H7A1.5 1.5 0 0 1 5.5 19V5A1.5 1.5 0 0 1 7 3.5z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M18 8a6.5 6.5 0 0 1 3 5.5m0 0-1.8-1.4M21 13.5l1.6-1.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <div>Rotate your device</div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
