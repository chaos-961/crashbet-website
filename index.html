<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lowpoly Garage — Procedural Vehicle Generator</title>
<meta name="description" content="Seeded low-poly 3D vehicle generator — 59 archetypes, endless variations.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%23ff7a3d' d='M4 20l3-7 4-3h10l4 3 3 7v5h-4a3 3 0 0 1-6 0h-4a3 3 0 0 1-6 0H4z'/></svg>">
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": { "three": "./libs/three.module.js" } }
</script>
</head>
<body>
<div id="stage" aria-label="3D vehicle viewer"></div>

<header class="hud top">
  <div class="brand">
    <svg class="logo" viewBox="0 0 48 32" aria-hidden="true">
      <path fill="url(#lg)" d="M4 22l4-9 7-4h14l7 4 8 9v5h-5a4 4 0 0 1-8 0H19a4 4 0 0 1-8 0H4z"/>
      <path fill="#181a1e" opacity=".55" d="M16 11h6v6h-9zM24 11h6l3 6h-9z"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff6a3d"/><stop offset="1" stop-color="#ffb03a"/>
      </linearGradient></defs>
    </svg>
    <div>
      <h1>LOWPOLY <span>GARAGE</span></h1>
      <p id="countline">— vehicle types</p>
    </div>
  </div>
  <div class="chip" id="stats" title="Triangles in current model">…</div>
</header>

<div class="hud bottom">
  <button class="namechip" id="namechip" title="Copy share link">
    <span class="vname" id="vname">…</span>
    <span class="vsub" id="vsub"></span>
  </button>

  <div class="panel">
    <div class="row">
      <label class="field grow">
        <span>Vehicle type</span>
        <select id="type" aria-label="Vehicle type"></select>
      </label>
      <label class="field seedfield">
        <span>Seed</span>
        <div class="seedbox">
          <input id="seed" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Seed" placeholder="any text">
          <button id="dice" class="ibtn ghost" aria-label="Random seed" title="Random seed">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.6" cy="8.6" r="1.6" fill="currentColor"/><circle cx="15.4" cy="8.6" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="8.6" cy="15.4" r="1.6" fill="currentColor"/><circle cx="15.4" cy="15.4" r="1.6" fill="currentColor"/></svg>
          </button>
        </div>
      </label>
    </div>

    <div class="row paintrow" id="paints" role="group" aria-label="Paint color"></div>

    <div class="row actions">
      <button id="prev" class="ibtn" aria-label="Previous vehicle" title="Previous (←)" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="gen" class="primary">Generate</button>
      <button id="next" class="ibtn" aria-label="Next vehicle" title="Next (→)" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="spin" class="ibtn" aria-label="Toggle turntable rotation" aria-pressed="true" title="Turntable (R)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M20 3v4h-4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
  <p class="hint">drag to orbit · scroll / pinch to zoom · <b>G</b> new vehicle · <b>R</b> spin</p>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
