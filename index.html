<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Crash Bet — Deterministic Crash-Physics Sandbox</title>
<meta name="description" content="Seeded low-poly vehicles that drive, crash and crumple — same seed, same crash, every time.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%23ff7a3d' d='M4 20l3-7 4-3h10l4 3 3 7v5h-4a3 3 0 0 1-6 0h-4a3 3 0 0 1-6 0H4z'/></svg>">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#25272c">
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": { "three": "./libs/three.module.js" } }
</script>
</head>
<body>
<div id="stage" aria-label="3D vehicle viewer"></div>

<header class="hud top">
  <div class="brand">
    <svg class="logo" viewBox="0 0 48 32" aria-hidden="true">
      <path fill="url(#lg)" d="M4 22l4-9 7-4h14l7 4 8 9v5h-5a4 4 0 0 1-8 0H19a4 4 0 0 1-8 0H4z"/>
      <path fill="#181a1e" opacity=".55" d="M16 11h6v6h-9zM24 11h6l3 6h-9z"/>
      <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff6a3d"/><stop offset="1" stop-color="#ffb03a"/>
      </linearGradient></defs>
    </svg>
    <div>
      <h1>CRASH <span>BET</span></h1>
      <p id="countline">— vehicle types</p>
    </div>
  </div>
  <div class="chip" id="stats" title="Triangles in current model">…</div>
</header>

<div class="hud bottom">
  <button class="namechip" id="namechip" title="Copy share link">
    <span class="vname" id="vname" aria-live="polite">…</span>
    <span class="vsub" id="vsub"></span>
  </button>

  <div class="panel">
    <div class="row tabs" role="tablist" aria-label="Mode">
      <button id="tabGarage" class="tab on" role="tab" aria-selected="true">Garage</button>
      <button id="tabCrash" class="tab" role="tab" aria-selected="false">💥 Crash</button>
    </div>

    <div class="row">
      <label class="field grow">
        <span>Vehicle type</span>
        <select id="type" aria-label="Vehicle type"></select>
      </label>
      <label class="field seedfield">
        <span>Seed</span>
        <div class="seedbox">
          <input id="seed" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Seed" placeholder="any text">
          <button id="dice" class="ibtn ghost" aria-label="Random seed" title="Random seed">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.6" cy="8.6" r="1.6" fill="currentColor"/><circle cx="15.4" cy="8.6" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="8.6" cy="15.4" r="1.6" fill="currentColor"/><circle cx="15.4" cy="15.4" r="1.6" fill="currentColor"/></svg>
          </button>
          <button id="fav" class="ibtn ghost" aria-label="Save to favorites" aria-pressed="false" title="Save to favorites">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path id="favstar" d="M12 3.8l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </label>
    </div>

    <div class="row paintrow" id="paints" role="group" aria-label="Paint color"></div>

    <div class="row carchips crashrow" id="carchips" role="group" aria-label="Cars in scene"></div>

    <div class="row sliders crashrow">
      <label class="field slider">
        <span>Heading <b id="v_heading">0°</b></span>
        <input type="range" id="c_heading" min="-180" max="180" step="5" value="0">
      </label>
      <label class="field slider">
        <span>Speed <b id="v_speed">50</b></span>
        <input type="range" id="c_speed" min="0" max="144" step="2" value="50">
      </label>
    </div>
    <div class="row sliders crashrow">
      <label class="field slider">
        <span>Steer <b id="v_steer">0°</b></span>
        <input type="range" id="c_steer" min="-30" max="30" step="1" value="0">
      </label>
      <label class="field slider">
        <span>Throttle <b id="v_throttle">100%</b></span>
        <input type="range" id="c_throttle" min="0" max="100" step="5" value="100">
      </label>
    </div>

    <div class="row actions crashrow">
      <button id="c_reset" class="ibtn" aria-label="Reset simulation" title="Reset (R)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 1 1 2.34 5.66" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M4 21v-4h4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="c_play" class="primary">▶ Play</button>
      <button id="c_step" class="ibtn" aria-label="Step one tick" title="Step one tick (.)">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5.5v13M10.5 5.5 17 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="c_slow" class="ibtn slowbtn" aria-label="Slow motion" aria-pressed="false" title="Slow motion">1×</button>
    </div>

    <div class="row actions garagerow">
      <button id="prev" class="ibtn" aria-label="Previous vehicle" title="Previous (←)" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="gen" class="primary">Generate</button>
      <button id="next" class="ibtn" aria-label="Next vehicle" title="Next (→)" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="tools" role="group" aria-label="Tools">
        <button id="spin" class="ibtn" aria-label="Toggle turntable rotation" aria-pressed="true" title="Turntable (R)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M20 3v4h-4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="snap" class="ibtn" aria-label="Save snapshot image" title="Snapshot (photo)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5h3l2-2.5h6l2 2.5h3a1.5 1.5 0 0 1 1.5 1.5v8A1.5 1.5 0 0 1 20 19.5H4A1.5 1.5 0 0 1 2.5 18v-8A1.5 1.5 0 0 1 4 8.5z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/><circle cx="12" cy="13.5" r="3.2" fill="none" stroke="currentColor" stroke-width="2.2"/></svg>
        </button>
        <button id="glb" class="ibtn" aria-label="Export 3D model (.glb)" title="Export .glb">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5v11M7.5 10 12 14.5 16.5 10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16.5v3A1.5 1.5 0 0 0 5.5 21h13a1.5 1.5 0 0 0 1.5-1.5v-3" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        </button>
        <button id="fleet" class="ibtn" aria-label="Toggle fleet view" aria-pressed="false" title="Fleet view (F)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3.5" width="7.5" height="7.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="2.2"/><rect x="13.5" y="3.5" width="7.5" height="7.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="2.2"/><rect x="3" y="14" width="7.5" height="7.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="2.2"/><rect x="13.5" y="14" width="7.5" height="7.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="2.2"/></svg>
        </button>
      </div>
    </div>
  </div>
  <p class="hint garagerow">drag to orbit · scroll / pinch to zoom · <b>G</b> new vehicle · <b>T</b> next type · <b>R</b> spin · <b>F</b> fleet · <b>S</b> slideshow · <b>H</b> hide UI</p>
  <p class="hint crashrow">tap car to select · drag to move · <b>Space</b> play · <b>R</b> reset · <b>.</b> step · <b>H</b> hide UI</p>
</div>

<button id="uitoggle" class="uitoggle" aria-label="Hide controls" aria-pressed="false" title="Hide controls (H)">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<div id="toast" role="status" aria-live="polite"></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
